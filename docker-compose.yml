services:
  falkordb:
    image: falkordb/falkordb:v4.18.0
    ports:
      - "6379:6379"
      - "127.0.0.1:3000:3000"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  falkordb_data:
